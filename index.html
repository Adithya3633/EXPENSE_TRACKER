<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>Expense <span>Tracker</span></h1>
    <p>Track your income and spending. Data saved automatically.</p>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-card balance">
      <div class="label">Balance</div>
      <div class="amount" id="balance">₹0.00</div>
    </div>
    <div class="summary-card income-card">
      <div class="label">Income</div>
      <div class="amount" id="totalIncome">₹0.00</div>
    </div>
    <div class="summary-card expense-card">
      <div class="label">Expenses</div>
      <div class="amount" id="totalExpense">₹0.00</div>
    </div>
  </div>

  <!-- SPEND BAR -->
  <div class="spend-bar-wrap">
    <div class="spend-bar-label">
      <span>Spending ratio</span>
      <span id="spendPct">0% of income spent</span>
    </div>
    <div class="spend-bar-track">
      <div class="spend-bar-fill" id="spendBar" style="width:0%"></div>
    </div>
  </div>

  <div class="main-split">
    <!-- FORM -->
    <div class="form-card">
      <h2>Add Transaction</h2>

      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">+ Income</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">− Expense</button>
      </div>

      <div class="field">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Freelance payment"/>
      </div>
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amt" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="field" id="catField" style="display: none;">
        <label>Category</label>
        <select id="cat">
          <option value="🍔 Food">🍔 Food</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="🏠 Rent">🏠 Rent</option>
          <option value="🛒 Shopping">🛒 Shopping</option>
          <option value="💊 Health">💊 Health</option>
          <option value="🎮 Entertainment">🎮 Entertainment</option>
          <option value="📚 Education">📚 Education</option>
          <option value="⚡ Utilities">⚡ Utilities</option>
          <option value="📦 Other">📦 Other</option>
        </select>
      </div>

      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- LIST -->
    <div class="list-card">
      <div class="list-header">
        <h2>Transactions</h2>
        <div class="filter-wrap">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense', this)">Expense</button>
        </div>
      </div>
      <div class="tx-list" id="txList"></div>
      <div id="clearWrap" style="display:none; padding: 0 1.4rem 0.8rem;">
        <button class="clear-btn" id="clearBtn" onclick="showConfirm()">Clear all transactions</button>
        <div id="clearConfirm" style="display:none; margin-top:6px; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.25); border-radius:10px; padding:10px 14px; font-size:0.82rem;">
          Are you sure? This cannot be undone.
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button onclick="clearAll()" style="flex:1; padding:5px; background:var(--expense); color:#fff; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer;">Yes, Clear</button>
            <button onclick="hideConfirm()" style="flex:1; padding:5px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer;">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
