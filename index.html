<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #222228;
      --border: rgba(255,255,255,0.07);
      --text: #f0eef8;
      --muted: #7c7a8a;
      --income: #4ade80;
      --expense: #f87171;
      --accent: #a78bfa;
      --accent-dim: rgba(167,139,250,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LAYOUT */
    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* HEADER */
    .app-header { margin-bottom: 2rem; }
    .app-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .app-header h1 span { color: var(--accent); }
    .app-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }

    /* SUMMARY CARDS */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
    }
    .summary-card .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .summary-card .amount {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .summary-card.balance .amount { color: var(--text); }
    .summary-card.income-card .amount { color: var(--income); }
    .summary-card.expense-card .amount { color: var(--expense); }

    /* PROGRESS BAR */
    .spend-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
      margin-bottom: 2rem;
    }
    .spend-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .spend-bar-track {
      background: var(--surface2);
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
    }
    .spend-bar-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--income), var(--accent));
      transition: width 0.5s ease;
    }

    /* MAIN SPLIT */
    .main-split {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 600px) {
      .main-split { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
      .summary .balance { grid-column: 1 / -1; }
    }

    /* FORM */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem;
    }
    .form-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: var(--text);
    }

    .field { margin-bottom: 0.9rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }
    .field select option { background: #222; }

    /* TYPE TOGGLE */
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 0.9rem;
    }
    .type-btn {
      padding: 0.6rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-btn.active-income {
      background: rgba(74,222,128,0.12);
      border-color: var(--income);
      color: var(--income);
    }
    .type-btn.active-expense {
      background: rgba(248,113,113,0.12);
      border-color: var(--expense);
      color: var(--expense);
    }

    .add-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #0f0f11;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.3rem;
    }
    .add-btn:hover { opacity: 0.85; }
    .add-btn:active { transform: scale(0.98); }

    /* TRANSACTION LIST */
    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }
    .list-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }
    .filter-wrap { display: flex; gap: 6px; }
    .filter-btn {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tx-list { max-height: 420px; overflow-y: auto; scrollbar-width: thin; }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.85rem 1.4rem;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s ease both;
      transition: background 0.15s;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: var(--surface2); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .tx-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .tx-icon.income { background: rgba(74,222,128,0.1); }
    .tx-icon.expense { background: rgba(248,113,113,0.1); }

    .tx-info { flex: 1; min-width: 0; }
    .tx-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .tx-amount {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      flex-shrink: 0;
    }
    .tx-amount.income { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }

    .tx-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .tx-del:hover { color: var(--expense); background: rgba(248,113,113,0.1); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty .e-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.88rem; }

    /* CLEAR ALL */
    .clear-btn {
      display: block;
      width: calc(100% - 2.8rem);
      margin: 0.8rem 1.4rem;
      padding: 0.55rem;
      background: transparent;
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      color: var(--expense);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .clear-btn:hover { background: rgba(248,113,113,0.08); }
  </style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>Expense <span>Tracker</span></h1>
    <p>Track your income and spending. Data saved automatically.</p>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-card balance">
      <div class="label">Balance</div>
      <div class="amount" id="balance">₹0.00</div>
    </div>
    <div class="summary-card income-card">
      <div class="label">Income</div>
      <div class="amount" id="totalIncome">₹0.00</div>
    </div>
    <div class="summary-card expense-card">
      <div class="label">Expenses</div>
      <div class="amount" id="totalExpense">₹0.00</div>
    </div>
  </div>

  <!-- SPEND BAR -->
  <div class="spend-bar-wrap">
    <div class="spend-bar-label">
      <span>Spending ratio</span>
      <span id="spendPct">0% of income spent</span>
    </div>
    <div class="spend-bar-track">
      <div class="spend-bar-fill" id="spendBar" style="width:0%"></div>
    </div>
  </div>

  <div class="main-split">
    <!-- FORM -->
    <div class="form-card">
      <h2>Add Transaction</h2>

      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">+ Income</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">− Expense</button>
      </div>

      <div class="field">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Freelance payment"/>
      </div>
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amt" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="cat">
          <option value="💼 Salary">💼 Salary</option>
          <option value="💻 Freelance">💻 Freelance</option>
          <option value="🎁 Gift">🎁 Gift</option>
          <option value="🍔 Food">🍔 Food</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="🏠 Rent">🏠 Rent</option>
          <option value="🛒 Shopping">🛒 Shopping</option>
          <option value="💊 Health">💊 Health</option>
          <option value="🎮 Entertainment">🎮 Entertainment</option>
          <option value="📚 Education">📚 Education</option>
          <option value="⚡ Utilities">⚡ Utilities</option>
          <option value="📦 Other">📦 Other</option>
        </select>
      </div>

      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- LIST -->
    <div class="list-card">
      <div class="list-header">
        <h2>Transactions</h2>
        <div class="filter-wrap">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense', this)">Expense</button>
        </div>
      </div>
      <div class="tx-list" id="txList"></div>
      <div id="clearWrap" style="display:none; padding: 0 1.4rem 0.8rem;">
        <button class="clear-btn" id="clearBtn" onclick="showConfirm()">Clear all transactions</button>
        <div id="clearConfirm" style="display:none; margin-top:6px; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.25); border-radius:10px; padding:10px 14px; font-size:0.82rem; color:var(--muted);">
          Are you sure? This cannot be undone.
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button onclick="clearAll()" style="flex:1; padding:5px; background:var(--expense); color:#fff; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer;">Yes, clear all</button>
            <button onclick="hideConfirm()" style="flex:1; padding:5px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:7px; font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer;">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ─── STATE ────────────────────────────────────────────────────────────────
  // Load from localStorage, or start with empty array
  let transactions = JSON.parse(localStorage.getItem('et_transactions') || '[]');
  let currentType = 'income';
  let currentFilter = 'all';

  // ─── SAVE ─────────────────────────────────────────────────────────────────
  // Called after every change — persists to localStorage
  function save() {
    localStorage.setItem('et_transactions', JSON.stringify(transactions));
  }

  // ─── FORMAT ───────────────────────────────────────────────────────────────
  function fmt(n) {
    return '₹' + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) +
           ' · ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  // ─── TYPE TOGGLE ──────────────────────────────────────────────────────────
  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').className  = 'type-btn' + (type === 'income'  ? ' active-income'  : '');
    document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  }

  // ─── ADD TRANSACTION ──────────────────────────────────────────────────────
  function addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amt  = parseFloat(document.getElementById('amt').value);
    const cat  = document.getElementById('cat').value;

    if (!desc)       return shake('desc');
    if (!amt || amt <= 0) return shake('amt');

    // Build transaction object
    const tx = {
      id:     Date.now(),          // unique ID using timestamp
      desc,
      amount: currentType === 'expense' ? -Math.abs(amt) : Math.abs(amt),
      cat,
      type:   currentType,
      date:   new Date().toISOString()
    };

    transactions.unshift(tx);     // add to front of array
    save();                        // persist to localStorage
    render();

    // Reset inputs
    document.getElementById('desc').value = '';
    document.getElementById('amt').value  = '';
  }

  // ─── DELETE TRANSACTION ───────────────────────────────────────────────────
  function deleteTransaction(id) {
    // filter() returns new array without the deleted item
    transactions = transactions.filter(tx => tx.id !== id);
    save();
    render();
  }

  function showConfirm() {
    document.getElementById('clearConfirm').style.display = 'block';
  }
  function hideConfirm() {
    document.getElementById('clearConfirm').style.display = 'none';
  }

  // ─── CLEAR ALL ────────────────────────────────────────────────────────────
  function clearAll() {
    transactions = [];
    save();
    hideConfirm();
    render();
  }

  // ─── FILTER ───────────────────────────────────────────────────────────────
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ─── COMPUTE TOTALS ───────────────────────────────────────────────────────
  function getTotals() {
    return transactions.reduce((acc, tx) => {
      if (tx.amount > 0) acc.income  += tx.amount;
      else               acc.expense += Math.abs(tx.amount);
      return acc;
    }, { income: 0, expense: 0 });
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function render() {
    // 1. Update summary cards
    const { income, expense } = getTotals();
    const balance = income - expense;

    const balEl = document.getElementById('balance');
    balEl.textContent = (balance < 0 ? '−' : '') + fmt(balance);
    balEl.style.color = balance < 0 ? 'var(--expense)' : balance > 0 ? 'var(--income)' : 'var(--text)';
    document.getElementById('totalIncome').textContent  = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);

    // 2. Spending bar
    const pct = income > 0 ? Math.min((expense / income) * 100, 100) : 0;
    document.getElementById('spendBar').style.width = pct.toFixed(1) + '%';
    document.getElementById('spendPct').textContent  = pct.toFixed(0) + '% of income spent';

    // 3. Filter transactions
    const filtered = currentFilter === 'all'
      ? transactions
      : transactions.filter(tx => tx.type === currentFilter);

    // 4. Render list
    const list = document.getElementById('txList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="e-icon">📭</div><p>${
        transactions.length === 0 ? 'No transactions yet. Add one!' : 'No ' + currentFilter + ' transactions.'
      }</p></div>`;
    } else {
      list.innerHTML = filtered.map(tx => `
        <div class="tx-item">
          <div class="tx-icon ${tx.type}">${tx.cat.split(' ')[0]}</div>
          <div class="tx-info">
            <div class="tx-name">${tx.desc}</div>
            <div class="tx-meta">${tx.cat.slice(tx.cat.indexOf(' ')+1)} · ${fmtDate(tx.date)}</div>
          </div>
          <div class="tx-amount ${tx.type}">${tx.type === 'income' ? '+' : '−'}${fmt(tx.amount)}</div>
          <button class="tx-del" onclick="deleteTransaction(${tx.id})" title="Delete">✕</button>
        </div>`).join('');
    }

    // 5. Show/hide clear button
    document.getElementById('clearWrap').style.display = transactions.length ? 'block' : 'none';
    if (!transactions.length) hideConfirm();
  }

  // ─── SHAKE ANIMATION (validation feedback) ────────────────────────────────
  function shake(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--expense)';
    el.style.animation = 'none';
    setTimeout(() => {
      el.style.animation = '';
      el.style.borderColor = '';
    }, 600);
    el.focus();
  }

  // ─── ENTER KEY ON INPUTS ──────────────────────────────────────────────────
  document.getElementById('desc').addEventListener('keydown', e => { if (e.key === 'Enter') addTransaction(); });
  document.getElementById('amt').addEventListener('keydown',  e => { if (e.key === 'Enter') addTransaction(); });

  // ─── INITIAL RENDER ───────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
